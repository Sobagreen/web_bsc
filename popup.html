<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Telnet Quick Connect</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="app">
    <h1>Telnet Quick Connect</h1>

    <label for="target">IP адрес:</label>
    <select id="target"></select>

    <div class="row">
      <button id="connectBtn">Подключиться</button>
      <button id="disconnectBtn" disabled>Отключиться</button>
    </div>

    <p id="status" class="status">Статус: не подключено</p>

    <label for="command">Команда:</label>
    <div class="row">
      <input id="command" type="text" placeholder="например: show version" />
      <button id="sendBtn" disabled>Отправить</button>
    </div>

    <label for="terminal">Вывод:</label>
    <pre id="terminal" class="terminal"></pre>
  </main>

  <script src="popup.js"></script>
</body>
</html>
